<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLAR SYSTEM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            font-size: 13px;
            line-height: 1.6;
            min-width: 250px;
            backdrop-filter: blur(10px);
            max-width: 350px;
        }

        #planet-info {
            font-size: 14px;
            margin-bottom: 10px;
            color: #64c8ff;
        }

        #planet-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            font-size: 12px;
            line-height: 1.6;
            backdrop-filter: blur(10px);
        }

        .controls-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #64c8ff;
        }

        .control-item {
            margin: 5px 0;
            color: #ddd;
        }

        #zoom-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            font-size: 12px;
            backdrop-filter: blur(10px);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #64c8ff;
            font-size: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px 50px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.5);
            z-index: 100;
        }

        @media (max-width: 768px) {
            #info-panel {
                top: 10px;
                right: 10px;
                min-width: 200px;
                padding: 15px;
                font-size: 12px;
            }

            #controls {
                bottom: 10px;
                left: 10px;
                padding: 12px;
                font-size: 11px;
            }

            #zoom-indicator {
                bottom: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="info-panel">
            <div id="planet-name">Système Solaire</div>
            <div id="planet-info">
                <div>Sélectionnez une planète pour plus d'informations</div>
            </div>
        </div>
        <div id="controls">
            <div class="controls-title">Contrôles</div>
            <div class="control-item">🖱️ Molette: Zoom avant/arrière</div>
            <div class="control-item">🖱️ Clic & Glisser: Rotation</div>
            <div class="control-item">📱 Pincement: Zoom</div>
            <div class="control-item">📱 1 Doigt: Rotation</div>
        </div>
        <div id="zoom-indicator">Zoom: 100%</div>
        <div id="loading">Chargement du système solaire...</div>
    </div>

    <!-- Three.js depuis CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Scripts du jeu -->
    <script src="js/PlanetData.js"></script>
    <script src="js/TextureGenerator.js"></script>
    <script src="js/Controls.js"></script>
    <script src="js/SolarSystem.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
